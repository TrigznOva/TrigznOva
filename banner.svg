<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0.03"/>
    </linearGradient>
    <style>
      .bg { fill: #0d1117; }
      .scanlines { fill: url(#scanline); }

      /* Grid */
      .grid { stroke: #161b22; stroke-width: 1; }

      /* Main text - draw stroke first */
      .main-stroke {
        font-family: 'Courier New', Courier, monospace;
        font-size: 86px;
        font-weight: 900;
        fill: none;
        stroke: #58A6FF;
        stroke-width: 1.2;
        stroke-dasharray: 2800;
        stroke-dashoffset: 2800;
        filter: url(#softglow);
        animation: draw-stroke 2.2s cubic-bezier(0.4,0,0.2,1) forwards 0.3s;
      }

      /* Main text - fill appears after draw */
      .main-fill {
        font-family: 'Courier New', Courier, monospace;
        font-size: 86px;
        font-weight: 900;
        fill: #58A6FF;
        opacity: 0;
        filter: url(#glow);
        animation: fill-appear 0.6s ease forwards 2.3s;
      }

      /* Dim glow behind */
      .main-glow {
        font-family: 'Courier New', Courier, monospace;
        font-size: 86px;
        font-weight: 900;
        fill: #58A6FF;
        opacity: 0;
        filter: url(#glow);
        animation: glow-pulse 2s ease-in-out infinite alternate 3.0s;
      }

      @keyframes draw-stroke {
        to { stroke-dashoffset: 0; }
      }
      @keyframes fill-appear {
        0%  { opacity: 0; }
        100%{ opacity: 1; }
      }
      @keyframes glow-pulse {
        0%  { opacity: 0.08; }
        100%{ opacity: 0.18; }
      }

      /* Subtitle */
      .subtitle {
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        letter-spacing: 3px;
        fill: #8b949e;
        opacity: 0;
        animation: fade-up 0.8s ease forwards 2.8s;
      }
      @keyframes fade-up {
        0%  { opacity: 0; transform: translateY(6px); }
        100%{ opacity: 1; transform: translateY(0); }
      }

      /* Cursor */
      .cursor {
        fill: #58A6FF;
        opacity: 0;
        animation: blink 0.9s step-end infinite 2.6s, cursor-appear 0.1s ease forwards 2.5s;
      }
      @keyframes cursor-appear { to { opacity: 1; } }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Corner accent dots */
      .accent-dot {
        fill: none;
        stroke: #58A6FF;
        stroke-width: 1;
        opacity: 0;
        animation: dot-pop 0.4s ease forwards;
      }
      .d1 { animation-delay: 3.0s; }
      .d2 { animation-delay: 3.1s; }
      .d3 { animation-delay: 3.2s; }
      .d4 { animation-delay: 3.3s; }
      @keyframes dot-pop {
        0%   { opacity: 0; r: 0; }
        70%  { opacity: 1; r: 5; }
        100% { opacity: 0.6; r: 3; }
      }

      /* Horizontal line */
      .h-line {
        stroke: #21262d;
        stroke-width: 1;
        stroke-dasharray: 900;
        stroke-dashoffset: 900;
        animation: line-draw 1.2s ease forwards 2.6s;
      }
      @keyframes line-draw {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="200"/>

  <!-- Subtle grid -->
  <line class="grid" x1="0" y1="100" x2="900" y2="100"/>
  <line class="grid" x1="450" y1="0" x2="450" y2="200"/>

  <!-- Horizontal separator line -->
  <line class="h-line" x1="0" y1="160" x2="900" y2="160"/>

  <!-- Glow layer (behind, pulsing) -->
  <text class="main-glow" x="450" y="135" text-anchor="middle">TrigznOva</text>

  <!-- Draw stroke first -->
  <text class="main-stroke" x="450" y="135" text-anchor="middle">TrigznOva</text>

  <!-- Fill appears after -->
  <text class="main-fill" x="450" y="135" text-anchor="middle">TrigznOva</text>

  <!-- Blinking cursor to the right of the text -->
  <rect class="cursor" x="672" y="58" width="3" height="80"/>

  <!-- Subtitle -->
  <text class="subtitle" x="450" y="182" text-anchor="middle">FULLSTACK DEV  ·  AI TOOLS  ·  MICRO-ENTREPRENEUR</text>

  <!-- Corner accent dots -->
  <circle class="accent-dot d1" cx="24" cy="24"/>
  <circle class="accent-dot d2" cx="876" cy="24"/>
  <circle class="accent-dot d3" cx="24" cy="176"/>
  <circle class="accent-dot d4" cx="876" cy="176"/>
</svg>
